<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose your language</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px; /* Ajout d'un padding pour le mobile */
        }

        .container {
            background-color: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        h1 {
            color: #ff0000;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 36px;
        }

        .lang-btn {
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Aligné à gauche pour plus de clarté */
            gap: 20px;
            width: 100%;
            padding: 14px 24px;
            margin-bottom: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background-color: white;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .lang-btn:hover {
            background-color: #ff0000;
            border-color: #ff0000;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 0, 0, 0.3);
        }

        .flag {
            font-size: 28px; /* Taille légèrement augmentée pour les emojis */
            line-height: 1;
        }

        .footer {
            margin-top: 32px;
            color: #bbb;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">📋</div>
    <h1>Choose your language</h1>
    <p class="subtitle">Choisissez votre langue</p>

    <a href="https://forms.office.com/e/HjtGz37UBm" class="lang-btn" target="_blank">
        <span class="flag">🇬🇧</span>
        <span>English</span>
    </a>

    <a href="https://forms.office.com/e/FP96NZL9ej" class="lang-btn" target="_blank">
        <span class="flag">🇫🇷</span>
        <span>Français</span>
    </a>

    <a href="https://forms.office.com/e/Cp7i1jc3Ug" class="lang-btn" target="_blank">
        <span class="flag">🇵🇹</span>
        <span>Português</span>
    </a>

    <a href="https://forms.office.com/e/wW2Jw8gcGL" class="lang-btn" target="_blank">
        <span class="flag">🇮🇹</span>
        <span>Italiano</span>
    </a>

    <a href="https://forms.office.com/e/7C8UHGdGdL" class="lang-btn" target="_blank">
        <span class="flag">🇷🇴</span>
        <span>Română</span>
    </a>

    <a href="https://forms.office.com/e/19mvaVAaNd" class="lang-btn" target="_blank">
        <span class="flag">🇪🇸</span>
        <span>Español</span>
    </a>

    <a href="https://forms.office.com/e/YyjYCvT8j4" class="lang-btn" target="_blank">
        <span class="flag">🇱🇹</span>
        <span>Lietuvių</span>
    </a>

    <a href="https://forms.office.com/e/du9saBcXsv" class="lang-btn" target="_blank">
        <span class="flag">🇷🇺</span>
        <span>Русский</span>
    </a>

    <a href="https://forms.office.com/e/yzJ3vpcZuB" class="lang-btn" target="_blank">
        <span class="flag">🇱🇻</span>
        <span>Latviešu</span>
    </a>

    <a href="https://forms.office.com/e/HEfRGDiHjP" class="lang-btn" target="_blank">
        <span class="flag">🇪🇪</span>
        <span>Eesti</span>
    </a>

    <div class="footer">
        Eiffage © 2025
    </div>
</div>

</body>
</html>
